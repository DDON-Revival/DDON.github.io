<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DDON Interactive Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --gold:      #c8a84b;
            --gold-dim:  #8a7030;
            --gold-glow: rgba(200,168,75,0.25);
            --bg-deep:   #0a0906;
            --bg-panel:  #100e0b;
            --bg-card:   #1a1710;
            --bg-hover:  #221f15;
            --border:    rgba(200,168,75,0.18);
            --border-mid:rgba(200,168,75,0.35);
            --text:      #d4c9a8;
            --text-dim:  #7a7060;
            --text-faint:#3a3428;
            --red:       #c0392b;
            --red-glow:  rgba(192,57,43,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg-deep); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }

        /* ── Layout ── */
        #app { display: flex; height: 100vh; overflow: hidden; }

        /* ══════════════════════════════════════════
           SIDEBAR
        ══════════════════════════════════════════ */
        #sidebar {
            width: 268px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        /* Dragon-scale texture overlay */
        #sidebar::before {
            content: '';
            position: absolute; inset: 0;
            background: 
                repeating-linear-gradient(60deg, transparent, transparent 18px, rgba(200,168,75,0.018) 18px, rgba(200,168,75,0.018) 19px),
                repeating-linear-gradient(-60deg, transparent, transparent 18px, rgba(200,168,75,0.018) 18px, rgba(200,168,75,0.018) 19px);
            pointer-events: none;
        }

        /* ── Sidebar Header ── */
        #sidebar-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        #sidebar-title {
            font-family: 'Cinzel', serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold-glow);
            margin-bottom: 2px;
        }
        #sidebar-subtitle {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-dim);
        }
        /* Gold underline ornament */
        #sidebar-header::after {
            content: '';
            display: block;
            position: absolute;
            bottom: -1px; left: 16px; right: 16px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
        }

        /* Lang buttons */
        .lang-row { display: flex; gap: 4px; margin-top: 10px; }
        .lang-btn {
            flex: 1; padding: 5px 0;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
            border-radius: 3px;
            border: 1px solid var(--border);
            background: transparent; color: var(--text-dim);
            cursor: pointer; transition: all 0.15s;
        }
        .lang-btn.active  { background: var(--gold); color: #0a0906; border-color: var(--gold); }
        .lang-btn:hover:not(.active) { border-color: var(--gold-dim); color: var(--text); }

        /* ── Map search ── */
        #search-box { padding: 8px 10px; border-bottom: 1px solid var(--border); }
        .dd-input {
            width: 100%;
            padding: 7px 10px 7px 30px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-size: 0.82rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.15s;
        }
        .dd-input::placeholder { color: var(--text-faint); }
        .dd-input:focus { outline: none; border-color: var(--gold-dim); }
        .input-wrap { position: relative; }
        .input-wrap .search-icon {
            position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
            font-size: 13px; color: var(--text-dim); pointer-events: none;
        }

        /* ── Map list ── */
        #map-list { flex: 1; overflow-y: auto; padding: 4px 0; }
        .map-group-header {
            padding: 8px 14px 3px;
            font-family: 'Cinzel', serif;
            font-size: 0.6rem; font-weight: 600; letter-spacing: 0.18em;
            text-transform: uppercase; color: var(--gold-dim);
        }
        .map-entry {
            padding: 5px 14px; cursor: pointer; font-size: 0.81rem;
            border-left: 2px solid transparent;
            transition: all 0.1s; display: flex; align-items: center; gap: 6px;
            color: var(--text-dim);
        }
        .map-entry:hover  { background: var(--bg-hover); color: var(--text); border-left-color: var(--gold-dim); }
        .map-entry.active { background: var(--bg-hover); border-left-color: var(--gold); color: var(--gold); }
        .map-entry .img-dot, .map-subentry .img-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
        .map-entry .img-dot.has-img, .map-subentry .img-dot.has-img { background: #5a9a5a; }
        .map-entry .img-dot.no-img,  .map-subentry .img-dot.no-img  { background: var(--text-faint); }
        .map-entry .expand-arrow { font-size: 0.55rem; color: var(--text-faint); flex-shrink:0; width:10px; text-align:center; transition: transform 0.15s; }
        .map-entry.expanded .expand-arrow { transform: rotate(90deg); }
        .map-sublist { display: none; }
        .map-sublist.open { display: block; }
        .map-subentry {
            padding: 4px 14px 4px 28px; cursor: pointer; font-size: 0.77rem;
            color: var(--text-faint); border-left: 2px solid transparent;
            transition: all 0.1s; display: flex; align-items: center; gap: 6px;
        }
        .map-subentry:hover  { background: var(--bg-hover); color: var(--text); }
        .map-subentry.active { background: var(--bg-hover); border-left-color: var(--gold); color: var(--gold); }

        /* ── Bottom panel ── */
        #layers-panel {
            padding: 10px 12px 12px;
            border-top: 1px solid var(--border);
            position: relative;
        }

        .panel-sep {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 8px 0;
        }

        .section-label {
            font-family: 'Cinzel', serif;
            font-size: 0.58rem; font-weight: 600; letter-spacing: 0.2em;
            text-transform: uppercase; color: var(--gold-dim);
            margin-bottom: 6px;
        }

        /* Enemy layer toggle */
        .layer-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 8px; }
        .layer-toggle input { cursor: pointer; accent-color: var(--gold); }
        .layer-toggle span  { font-size: 0.82rem; color: var(--text); }

        /* Channel selector */
        .channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 8px; }
        .channel-btn {
            padding: 5px 4px;
            font-size: 0.72rem; font-weight: 500;
            border-radius: 3px;
            border: 1px solid var(--border);
            background: transparent; color: var(--text-dim);
            cursor: pointer; transition: all 0.15s; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .channel-btn:hover  { border-color: var(--gold-dim); color: var(--text); }
        .channel-btn.active { background: var(--gold); color: #0a0906; border-color: var(--gold); font-weight: 600; }

        /* Pill filter buttons */
        .pill-row { display: flex; gap: 4px; margin-bottom: 8px; }
        .pill-btn {
            flex: 1; padding: 5px 6px;
            font-size: 0.72rem; border-radius: 3px;
            border: 1px solid var(--border);
            background: transparent; color: var(--text-dim);
            cursor: pointer; transition: all 0.15s; text-align: center;
        }
        .pill-btn:hover          { border-color: var(--gold-dim); color: var(--text); }
        .pill-btn.active         { background: var(--gold); color: #0a0906; border-color: var(--gold); font-weight: 600; }
        .pill-btn.active-red     { background: var(--red); color: #fff; border-color: var(--red); font-weight: 600; }

        /* Enemy search */
        #enemy-search { margin-bottom: 8px; }

        /* Expand/collapse */
        #btn-expand-collapse {
            width: 100%; padding: 6px 0;
            font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            border-radius: 3px;
            border: 1px solid var(--border);
            background: transparent; color: var(--text-dim);
            cursor: pointer; transition: all 0.15s;
        }
        #btn-expand-collapse:hover { border-color: var(--gold-dim); color: var(--gold); }

        /* Help text */
        .help-text { font-size: 0.68rem; color: var(--text-faint); line-height: 1.9; margin-top: 8px; }

        /* ══════════════════════════════════════════
           MAP AREA
        ══════════════════════════════════════════ */
        #map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #050403; }

        #map-title {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            z-index: 1000;
            background: rgba(10,9,6,0.92);
            padding: 6px 20px;
            border-radius: 2px;
            font-family: 'Cinzel', serif;
            font-size: 0.88rem; font-weight: 600; letter-spacing: 0.1em;
            color: var(--gold);
            pointer-events: none;
            border: 1px solid var(--border-mid);
            box-shadow: 0 0 24px rgba(0,0,0,0.8), 0 0 12px var(--gold-glow);
            text-shadow: 0 0 12px var(--gold-glow);
        }

        #floor-selector, #tile-layer-selector {
            position: absolute; z-index: 1000;
            left: 50%; transform: translateX(-50%); display: flex; gap: 4px;
        }
        #floor-selector { top: 48px; }
        #tile-layer-selector { top: 82px; }

        #floor-selector button, #tile-layer-selector button {
            background: rgba(10,9,6,0.92); color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: 2px; padding: 3px 12px;
            font-size: 0.72rem; cursor: pointer;
            transition: all 0.12s;
            font-family: 'Inter', sans-serif;
        }
        #floor-selector button.active, #tile-layer-selector button.active {
            background: var(--gold); color: #0a0906;
            border-color: var(--gold); font-weight: 600;
        }

        #coord-display {
            position: absolute; bottom: 10px; right: 10px; z-index: 1000;
            background: rgba(10,9,6,0.85);
            padding: 4px 10px; border-radius: 2px;
            font-size: 0.78rem; font-family: monospace;
            color: var(--text-dim); pointer-events: none;
            min-width: 240px; text-align: right;
            border: 1px solid var(--border);
        }

        /* ══════════════════════════════════════════
           LEAFLET OVERRIDES
        ══════════════════════════════════════════ */
        .leaflet-bar { border: 1px solid var(--border) !important; }
        .leaflet-bar a {
            background: rgba(10,9,6,0.92) !important;
            color: var(--text-dim) !important;
            border-bottom: 1px solid var(--border) !important;
        }
        .leaflet-bar a:hover { color: var(--gold) !important; background: var(--bg-hover) !important; }

        /* Popup */
        .leaflet-popup-content-wrapper {
            background: var(--bg-panel) !important;
            border: 1px solid var(--border-mid) !important;
            border-radius: 4px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8), 0 0 16px var(--gold-glow) !important;
            padding: 0 !important;
        }
        .leaflet-popup-tip-container { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
        .leaflet-popup-tip { background: var(--bg-panel) !important; }
        .leaflet-popup-content { margin: 0 !important; min-width: 190px; }
        .leaflet-popup-close-button {
            color: var(--text-dim) !important; top: 7px !important; right: 9px !important;
            font-size: 18px !important; font-weight: 300 !important;
        }
        .leaflet-popup-close-button:hover { color: var(--gold) !important; background: none !important; }

        /* ══════════════════════════════════════════
           POPUP STYLES
        ══════════════════════════════════════════ */
        .dd-popup { padding: 10px 13px 11px; font-size: 0.82rem; }

        .dd-popup-top {
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 6px; padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        .pp-sg-badge {
            display: inline-block; padding: 1px 7px;
            border-radius: 2px; font-size: 0.68rem; font-weight: 700;
        }
        .dd-popup-idx { font-size: 0.68rem; color: var(--text-faint); margin-left: auto; }

        .dd-popup-name {
            font-family: 'Cinzel', serif;
            font-size: 0.95rem; font-weight: 600;
            color: var(--gold); letter-spacing: 0.04em;
            margin-bottom: 3px;
            text-shadow: 0 0 8px var(--gold-glow);
        }

        .dd-popup-lv { font-size: 0.80rem; color: var(--text); margin-bottom: 2px; display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }
        .dd-spawn-time { font-size: 0.68rem; color: var(--text-dim); margin-left: 4px; }

        .pp-badge { display: inline-block; padding: 1px 5px; border-radius: 2px; font-size: 0.64rem; font-weight: 700; }
        .pp-boss  { background: rgba(160,60,0,0.5); color: #ff8040; border: 1px solid rgba(255,128,64,0.3); }
        .pp-blood { background: rgba(140,0,0,0.5);  color: #ff5555; border: 1px solid rgba(255,85,85,0.3); }
        .pp-high  { background: rgba(0,100,0,0.5);  color: #55ff55; border: 1px solid rgba(85,255,85,0.3); }

        .dd-popup-stats { font-size: 0.70rem; color: var(--text-dim); margin-top: 2px; display: flex; gap: 10px; }

        .dd-drops { margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border); }
        .dd-drops-title {
            font-family: 'Cinzel', serif; font-size: 0.6rem; font-weight: 600;
            letter-spacing: 0.15em; text-transform: uppercase;
            color: var(--gold-dim); margin-bottom: 5px;
        }
        .pp-drop { display: flex; justify-content: space-between; align-items: center; padding: 1px 0; gap: 8px; }
        .pp-drop-name { font-size: 0.76rem; color: var(--text); flex: 1; }
        .pp-rate { font-size: 0.72rem; font-weight: 700; white-space: nowrap; }
        .pp-rate.hi  { color: #6dbb55; }
        .pp-rate.mid { color: #c9a84c; }
        .pp-rate.lo  { color: var(--text-dim); }

        /* ══════════════════════════════════════════
           ENEMY MARKERS
        ══════════════════════════════════════════ */
        .enemy-marker { filter: drop-shadow(0 0 3px rgba(0,0,0,0.9)); }

        .group-chip {
            display: inline-flex; align-items: center; gap: 3px;
            padding: 2px 7px 2px 5px;
            border: 1px solid currentColor; border-radius: 2px;
            background: rgba(10,9,6,0.92);
            font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600;
            white-space: nowrap; cursor: pointer; user-select: none;
            text-shadow: 0 0 6px rgba(0,0,0,1);
            box-shadow: 0 0 8px rgba(0,0,0,0.9);
            transition: background 0.1s;
        }
        .group-chip:hover { background: rgba(26,23,16,0.97); }
        .chip-count  { font-size: 8px; opacity: 0.6; font-weight: 400; }
        .chip-arrow  { font-size: 7px; transition: transform 0.15s; display: inline-block; opacity: 0.6; }
        .chip-arrow.open { transform: rotate(90deg); }
        .group-chip.chip-open { opacity: 0.7; }

        /* Pd boundary */
        .pd-label { color: #c8a84b; font-size: 10px; font-family: monospace; font-weight: 600; white-space: nowrap; pointer-events: none; }
        .pd-label-btn { pointer-events: auto; cursor: zoom-in; text-decoration: underline dotted; }
        .pd-label-btn:hover { color: #f0d080; }

        /* Grid */
        .grid-label { color: rgba(200,168,75,0.3); font-size: 10px; font-family: monospace; font-weight: 600; text-align: center; pointer-events: none; white-space: nowrap; }

        /* Icons */
        .ddon-icon { height: 32px; width: 32px; background-image: url("./datas/MapIcons.webp"); background-size: 256px; }
        .ddon-icon-door    { background-position: -191px 0; }
        .ddon-icon-dungeon { background-position: -111px -29px; }

        .leaflet-control-reset-view { font-size: 18px; line-height: 26px !important; }

        /* Scrollbar */
        #map-list::-webkit-scrollbar { width: 4px; }
        #map-list::-webkit-scrollbar-track { background: transparent; }
        #map-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        /* ── Search tabs ── */
        .search-tab { transition: all 0.15s; }
        .search-tab.active { background: var(--gold) !important; color: #0a0906 !important; border-color: var(--gold) !important; }
        .search-tab:hover:not(.active) { border-color: var(--gold-dim) !important; color: var(--text) !important; }

        /* ── Gathering markers ── */
        .gather-marker {
            width: 20px; height: 20px;
            filter: drop-shadow(0 0 3px rgba(0,0,0,0.8));
            cursor: pointer;
            transition: transform 0.1s;
        }
        .gather-marker:hover { transform: scale(1.3); }

        /* ── Area name labels ── */
        .area-label {
            font-family: 'Cinzel', serif;
            font-weight: 600;
            color: rgba(220, 200, 150, 0.8);
            text-shadow: 0 1px 4px #000, 0 0 12px #0008;
            letter-spacing: 0.1em;
            white-space: nowrap;
            pointer-events: none;
            text-transform: uppercase;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
<div id="app">
    <!-- ══ SIDEBAR ══ -->
    <div id="sidebar">
        <div id="sidebar-header">
            <div id="sidebar-title">DDON Maps</div>
            <div id="sidebar-subtitle">Dragon's Dogma Online — Interactive</div>
            <div class="lang-row">
                <button class="lang-btn" data-lang="en">English</button>
                <button class="lang-btn" data-lang="jp">日本語</button>
            </div>
        </div>

        <div id="search-box">
            <div style="display:flex;gap:2px;margin-bottom:6px">
                <button class="search-tab active" data-mode="map" style="flex:1;padding:4px 0;font-size:0.65rem;font-family:'Cinzel',serif;font-weight:600;letter-spacing:0.04em;border-radius:3px;border:1px solid var(--border);background:var(--gold);color:#0a0906;cursor:pointer;transition:all 0.15s">Maps</button>
                <button class="search-tab" data-mode="enemy" style="flex:1;padding:4px 0;font-size:0.65rem;font-family:'Cinzel',serif;font-weight:600;letter-spacing:0.04em;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.15s">Enemy</button>
                <button class="search-tab" data-mode="gathering" style="flex:1;padding:4px 0;font-size:0.65rem;font-family:'Cinzel',serif;font-weight:600;letter-spacing:0.04em;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.15s">Gather</button>
                <button class="search-tab" data-mode="drops" style="flex:1;padding:4px 0;font-size:0.65rem;font-family:'Cinzel',serif;font-weight:600;letter-spacing:0.04em;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.15s">Drops</button>
            </div>
            <div class="input-wrap">
                <span class="search-icon">🗺</span>
                <input type="text" id="map-search" class="dd-input" placeholder="Search maps...">
            </div>
        </div>

        <div id="map-list"></div>

        <div id="layers-panel">
            <!-- Channel selector -->
            <div class="section-label">Channel</div>
            <div class="channel-grid">
                <button class="channel-btn" data-channel="normal">Normal</button>
                <button class="channel-btn" data-channel="collab">Collab</button>
                <button class="channel-btn" data-channel="custom">Custom</button>
                <button class="channel-btn" data-channel="bossrush">Boss Rush</button>
            </div>

            <div class="panel-sep"></div>

            <!-- Enemy layer toggle -->
            <label class="layer-toggle">
                <input type="checkbox" id="layer-enemies" checked>
                <span>Enemy Spawns</span>
            </label>
            <label class="layer-toggle" style="margin-bottom:8px">
                <input type="checkbox" id="layer-gathering" checked>
                <span>Gathering Nodes</span>
            </label>
            <label class="layer-toggle" style="margin-bottom:8px">
                <input type="checkbox" id="layer-npcs">
                <span>NPCs &amp; Shops</span>
            </label>
            <label class="layer-toggle" style="margin-bottom:8px">
                <input type="checkbox" id="layer-arealabels">
                <span>Area Names</span>
            </label>

            <!-- Dev layers — hidden from players, JS uses them -->
            <label class="layer-toggle" style="display:none"><input type="checkbox" id="layer-landmarks" checked>Landmarks</label>
            <label class="layer-toggle" style="display:none"><input type="checkbox" id="layer-connections" checked>Connections</label>
            <label class="layer-toggle" style="display:none"><input type="checkbox" id="layer-territory">Territory Bounds</label>
            <label class="layer-toggle" style="display:none"><input type="checkbox" id="layer-grid">Grid</label>

            <!-- Spawn time -->
            <div class="section-label">Spawn Time</div>
            <div class="pill-row">
                <button class="pill-btn filter-time-btn" data-time="all">All</button>
                <button class="pill-btn filter-time-btn" data-time="day">☀ Day</button>
                <button class="pill-btn filter-time-btn" data-time="night">🌙 Night</button>
            </div>

            <!-- Type filter -->
            <div class="section-label">Type</div>
            <div class="pill-row" style="margin-bottom:8px">
                <button class="pill-btn filter-toggle-btn" data-filter="boss">Boss</button>
                <button class="pill-btn filter-toggle-btn" data-filter="bloodOrb">Blood Orb</button>
                <button class="pill-btn filter-toggle-btn" data-filter="highOrb">High Orb</button>
            </div>

            <!-- Enemy search -->
            <div class="section-label">Enemy Search</div>
            <div class="input-wrap" style="margin-bottom:8px">
                <span class="search-icon">⚔</span>
                <input type="text" id="enemy-search" class="dd-input" placeholder="Search enemy name...">
            </div>

            <button id="btn-expand-collapse">Expand All</button>

            <div class="help-text">
                Click chip → expand group<br>
                Middle-click hull → collapse<br>
                Click spawn dot → show radii
            </div>
        </div>
    </div>

    <!-- ══ MAP ══ -->
    <div id="map-container">
        <div id="map-title">—</div>
        <div id="floor-selector"></div>
        <div id="tile-layer-selector"></div>
        <div id="map"></div>
        <div id="coord-display"></div>
    </div>
</div>
<script type="module" src="map.js"></script>
</body>
</html>
