<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DDON Interactive Map</title>

<style>

body{
background:#0f0f12;
color:white;
font-family:Arial;
margin:0;
}

#toolbar{
padding:10px;
background:#18181d;
border-bottom:1px solid #333;
}

#map-wrapper{
position:relative;
width:1200px;
margin:auto;
overflow:hidden;
}

#map{
position:relative;
}

#map img{
width:100%;
display:block;
}

.enemy-marker{
position:absolute;
width:12px;
height:12px;
background:#ff4444;
border:2px solid white;
border-radius:50%;
transform:translate(-50%,-50%);
cursor:pointer;
}

.gather-marker{
position:absolute;
width:12px;
height:12px;
background:#2ecc71;
border:2px solid white;
border-radius:50%;
transform:translate(-50%,-50%);
}

.tooltip{
position:absolute;
background:#000;
padding:6px 8px;
border-radius:4px;
font-size:12px;
pointer-events:none;
display:none;
}

</style>
</head>

<body>

<div id="toolbar">

<select id="stageSelect"></select>

<button onclick="zoomIn()">Zoom +</button>
<button onclick="zoomOut()">Zoom -</button>

</div>

<div id="map-wrapper">

<div id="map">

<img id="mapImage">

</div>

<div id="tooltip" class="tooltip"></div>

</div>

<script src="map.js"></script>

</body>
</html>
