<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DDON Maps</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: system-ui, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        #app {
            display: flex;
            height: 100vh;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #16213e;
            border-right: 1px solid #0f3460;
            overflow: hidden;
        }

        #sidebar h1 {
            padding: 12px 16px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #e94560;
            border-bottom: 1px solid #0f3460;
        }

        #search-box {
            padding: 8px;
            border-bottom: 1px solid #0f3460;
        }

        #search-box input {
            width: 100%;
            padding: 6px 8px;
            background: #0f3460;
            border: none;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 0.85rem;
        }

        #search-box input::placeholder { color: #888; }

        #map-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .map-group-header {
            padding: 6px 16px 2px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #888;
        }

        .map-entry {
            padding: 5px 16px;
            cursor: pointer;
            font-size: 0.82rem;
            border-left: 3px solid transparent;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .map-entry:hover { background: #0f3460; }

        .map-entry.active {
            background: #0f3460;
            border-left-color: #e94560;
            color: #fff;
        }

        .map-entry .img-dot,
        .map-subentry .img-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .map-entry .img-dot.has-img,
        .map-subentry .img-dot.has-img { background: #4caf50; }
        .map-entry .img-dot.no-img,
        .map-subentry .img-dot.no-img  { background: #555; }

        .map-entry .expand-arrow {
            font-size: 0.6rem;
            color: #888;
            flex-shrink: 0;
            transition: transform 0.15s;
            width: 10px;
            text-align: center;
        }
        .map-entry.expanded .expand-arrow { transform: rotate(90deg); }

        .map-sublist { display: none; }
        .map-sublist.open { display: block; }

        .map-subentry {
            padding: 4px 16px 4px 30px;
            cursor: pointer;
            font-size: 0.78rem;
            color: #aaa;
            border-left: 3px solid transparent;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .map-subentry:hover { background: #0f3460; color: #e0e0e0; }
        .map-subentry.active {
            background: #0f3460;
            border-left-color: #e94560;
            color: #fff;
        }

        /* ── Layers panel ── */
        #layers-panel {
            padding: 10px 16px;
            border-top: 1px solid #0f3460;
            font-size: 0.82rem;
        }

        #layers-panel h3 {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 6px;
        }

        .layer-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            cursor: pointer;
        }

        .layer-toggle input { cursor: pointer; accent-color: #e94560; }

        /* ── Map container ── */
        #map-container {
            flex: 1;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #0d0d1a;
        }

        #map-title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(22, 33, 62, 0.9);
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            pointer-events: none;
            border: 1px solid #0f3460;
        }

        #floor-selector {
            position: absolute;
            top: 42px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 4px;
        }
        #floor-selector button {
            background: rgba(22, 33, 62, 0.88);
            color: #ccd;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        #floor-selector button.active {
            background: #0f3460;
            color: #fff;
            border-color: #4a90d9;
        }

        #tile-layer-selector {
            position: absolute;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 4px;
        }
        #tile-layer-selector button {
            background: rgba(22, 33, 62, 0.88);
            color: #ccd;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        #tile-layer-selector button.active {
            background: #0f3460;
            color: #fff;
            border-color: #4a90d9;
        }

        #coord-display {
            position: absolute;
            bottom: 8px;
            right: 8px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.88);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: monospace;
            font-weight: 600;
            color: #e0e0e0;
            pointer-events: none;
            min-width: 280px;
            text-align: right;
            border: 1px solid #0f3460;
        }

        /* ── Pd piece boundary labels ── */
        .pd-label {
            color: #ffcc44;
            font-size: 10px;
            font-family: monospace;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
        }
        .pd-label-btn {
            pointer-events: auto;
            cursor: zoom-in;
            text-decoration: underline dotted;
        }
        .pd-label-btn:hover { color: #ffe88a; }

        /* ── Grid labels ── */
        .grid-label {
            color: rgba(255, 255, 255, 0.55);
            font-size: 10px;
            font-family: monospace;
            font-weight: 600;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            text-shadow: 0 0 3px rgba(0,0,0,0.9);
        }

        /* ── Icons ── */
        .ddon-icon {
            height: 32px;
            width: 32px;
            background-image: url("./datas/MapIcons.webp");
            background-size: 256px;
        }
        .ddon-icon-door    { background-position: -191px 0; }
        .ddon-icon-dungeon { background-position: -111px -29px; }

        /* ── Enemy marker drop-shadow for contrast against any map background ── */
        .enemy-marker {
            filter: drop-shadow(0 0 2px #000) drop-shadow(0 0 1px #000);
        }

        /* ── Group chip labels ── */
        .group-chip {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 7px 2px 5px;
            border: 1.5px solid currentColor;
            border-radius: 10px;
            background: rgba(10, 15, 35, 0.88);
            font-family: system-ui, sans-serif;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            text-shadow: 0 0 4px rgba(0,0,0,0.9);
            box-shadow: 0 0 4px rgba(0,0,0,0.7);
            transition: background 0.1s;
        }
        .group-chip:hover { background: rgba(30, 40, 80, 0.95); }
        .chip-count {
            font-size: 9px;
            opacity: 0.75;
            font-weight: 500;
        }
        .chip-arrow {
            font-size: 8px;
            transition: transform 0.15s;
            display: inline-block;
            opacity: 0.8;
        }
        .chip-arrow.open { transform: rotate(90deg); }
        .group-chip.chip-open { opacity: 0.75; }

        /* ── Reset-view control ── */
        .leaflet-control-reset-view {
            font-size: 18px;
            line-height: 26px !important;
            font-weight: normal;
        }

        /* ── Scrollbar ── */
        #map-list::-webkit-scrollbar { width: 6px; }
        #map-list::-webkit-scrollbar-track { background: transparent; }
        #map-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
    </style>
</head>
<body>
<div id="app">
    <div id="sidebar">
        <h1>DDON Maps</h1>
        <div id="search-box">
            <input type="text" id="map-search" placeholder="Search maps...">
        </div>
        <div id="map-list"></div>
        <div id="layers-panel">
            <h3>Layers</h3>
            <label class="layer-toggle">
                <input type="checkbox" id="layer-enemies" checked>
                Enemy Spawns
            </label>
            <label class="layer-toggle">
                <input type="checkbox" id="layer-landmarks" checked>
                Landmarks
            </label>
            <label class="layer-toggle">
                <input type="checkbox" id="layer-connections" checked>
                Connections
            </label>
            <label class="layer-toggle">
                <input type="checkbox" id="layer-territory">
                Territory Bounds
            </label>
            <label class="layer-toggle">
                <input type="checkbox" id="layer-grid">
                Grid
            </label>
            <button id="btn-expand-collapse" style="
                margin-top:8px;width:100%;padding:4px 0;
                background:#0f3460;color:#e0e0e0;border:1px solid #1a4a7a;
                border-radius:4px;font-size:0.78rem;cursor:pointer;
            ">Expand All</button>
            <div style="margin-top:6px;padding-top:6px;border-top:1px solid #0f3460;font-size:0.75rem;color:#888;line-height:1.7">
                Click chip to expand group<br>
                Middle-click hull to collapse<br>
                Click spawn to show:<br>
                <span style="color:#ffd700">&#9679;</span> Aggro radius<br>
                <span style="color:#ff7700">&#9675;</span> Link radius
            </div>
        </div>
    </div>

    <div id="map-container">
        <div id="map-title">—</div>
        <div id="floor-selector"></div>
        <div id="tile-layer-selector"></div>
        <div id="map"></div>
        <div id="coord-display"></div>
    </div>
</div>
<script type="module" src="map.js"></script>
</body>
</html>
