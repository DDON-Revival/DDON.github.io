<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DDON - Reset Password</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#121425 0%,#0a0b14 60%);
    font-family:'Cinzel', serif;
    color:#e6e6e6;
}

.card{
    width:420px;
    background:linear-gradient(145deg,#181a30,#101222);
    border:1px solid #2a2e50;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
    padding:40px;
    text-align:center;
}

.card h2{
    margin-top:0;
    color:#c8a75d;
    letter-spacing:1px;
    border-bottom:1px solid #2a2e50;
    padding-bottom:15px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    background:#0f1020;
    border:1px solid #2a2e50;
    color:white;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#c8a75d;
    box-shadow:0 0 10px rgba(200,167,93,0.5);
}

button{
    width:100%;
    padding:12px;
    background:#c8a75d;
    border:none;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    box-shadow:0 0 15px rgba(200,167,93,0.7);
}

#msg{
    margin-top:20px;
    font-size:14px;
}

.success{
    color:#4caf50;
}

.error{
    color:#ff6b6b;
}
</style>
</head>

<body>

<div class="card">
    <h2 data-key="resetPasswordTitle"></h2>

    <input id="newPassword" type="password" data-placeholder="newPassword">

    <button onclick="resetPassword()" data-key="resetPasswordBtn"></button>

    <p id="msg"></p>
</div>

<script src="translations.js"></script>

<script>

function getToken(){
    const params = new URLSearchParams(window.location.search);
    return params.get("token");
}

async function resetPassword(){

    const token = getToken();
    const newPassword = document.getElementById("newPassword").value;
    const msg = document.getElementById("msg");

const lang = localStorage.getItem("lang") || "en";
const t = translations[lang];

if(!newPassword || newPassword.length < 6){
    msg.textContent = t.PASSWORD_TOO_SHORT;
    msg.className = "error";
    return;
}

    const res = await fetch("https://api.ddon.org/api/reset-password",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            token,
            newPassword
        })
    });

    const data = await res.json();

if(res.ok){
    msg.textContent = t[data.message] || data.message;
    msg.className = "success";
}else{
    msg.textContent = t[data.error] || data.error;
    msg.className = "error";
}

}

function applyTranslations(){
    const lang = localStorage.getItem("lang") || "en";
    const t = translations[lang];

    document.querySelectorAll("[data-key]").forEach(el=>{
        const key = el.getAttribute("data-key");
        if(t[key]) el.textContent = t[key];
    });

    document.querySelectorAll("[data-placeholder]").forEach(el=>{
        const key = el.getAttribute("data-placeholder");
        if(t[key]) el.placeholder = t[key];
    });
}

window.onload = applyTranslations;

</script>

<script src="js/navbar.js"></script>
</body>
</html>
